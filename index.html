<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, viewport-fit=cover" />
  <title>LTC Smart Care</title>
  <meta name="theme-color" content="#0284c7" />
  <link rel="manifest" href="manifest.json" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+Thai:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.9/dist/chart.umd.min.js"></script>
  <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
  <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
  <link rel="stylesheet" href="assets/css/app.css" />
</head>
<body class="bg-slate-50 font-thai text-slate-800 min-h-screen">

  <!-- Offline Banner -->
  <div id="offline-banner" class="hidden fixed top-0 inset-x-0 z-50 bg-amber-500 text-white text-xs text-center py-2">
    คุณกำลังออฟไลน์ — ข้อมูลบางส่วนอาจไม่เป็นปัจจุบัน
  </div>

  <!-- Loading Overlay -->
  <div id="loading-overlay" class="hidden fixed inset-0 z-40 bg-white/70 backdrop-blur-sm flex items-center justify-center">
    <div class="w-10 h-10 border-4 border-sky-500 border-t-transparent rounded-full animate-spin"></div>
  </div>

  <!-- Toast -->
  <div id="toast-container" class="hidden fixed bottom-20 md:bottom-6 inset-x-4 z-50 flex justify-center"></div>

  <div class="md:flex md:min-h-screen">

    <!-- Sidebar (Desktop เท่านั้น) -->
    <aside class="no-print hidden md:flex md:flex-col md:w-64 md:shrink-0 bg-white border-r border-slate-200 md:sticky md:top-0 md:h-screen">
      <div class="px-5 py-5 border-b border-slate-100">
        <h1 class="text-lg font-bold text-sky-700">LTC Smart Care</h1>
        <p class="text-xs text-slate-400 mt-0.5">ระบบดูแลผู้ป่วยระยะยาวในชุมชน</p>
      </div>
      <nav class="flex-1 px-3 py-4 space-y-1">
        <a href="#/dashboard" data-route="/dashboard" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-5.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V20h3.5a1 1 0 0 0 1-1v-9"/></svg>
          <span>หน้าหลัก</span>
        </a>
        <a href="#/patients" data-route="/patients" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5"/><circle cx="17" cy="7" r="2.3"/><path d="M14.8 14.8c.7-.3 1.4-.5 2.2-.5 2.7 0 5 2.1 5 4.8"/></svg>
          <span>ผู้ป่วย</span>
        </a>
        <a href="#/assessments" data-route="/assessments" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.5" width="14" height="17" rx="2"/><path d="M9 4.5V3.8a1.3 1.3 0 0 1 1.3-1.3h3.4A1.3 1.3 0 0 1 15 3.8v.7"/><path d="M8.5 13l2.2 2.2L15.5 10.5"/></svg>
          <span>แบบประเมิน</span>
        </a>
        <a href="#/map" data-route="/map" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M12 21s-7-6.2-7-11.5A7 7 0 0 1 19 9.5C19 14.8 12 21 12 21Z"/><circle cx="12" cy="9.5" r="2.5"/></svg>
          <span>แผนที่ผู้ป่วย</span>
        </a>
        <a href="#/reports" data-route="/reports" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M4 20V10M10 20V4M16 20v-7M21 20H3"/></svg>
          <span>รายงาน</span>
        </a>
        <a href="#/settings" data-route="/settings" class="flex items-center gap-3 px-3 py-2.5 rounded-xl text-sm font-medium text-slate-400 hover:bg-slate-50">
          <svg class="w-5 h-5 shrink-0" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v2.4M12 19.1v2.4M21.5 12h-2.4M4.9 12H2.5M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7M18.4 18.4l-1.7-1.7M7.3 7.3 5.6 5.6"/></svg>
          <span>ตั้งค่า</span>
        </a>
      </nav>
      <div id="sidebar-user" class="px-5 py-4 border-t border-slate-100 text-xs text-slate-400"></div>
    </aside>

    <div class="flex-1 flex flex-col md:min-h-screen min-w-0">
      <!-- Header (มือถือเท่านั้น) -->
      <header class="no-print md:hidden sticky top-0 z-30 bg-white border-b border-slate-200 px-4 py-3">
        <h1 class="text-base font-bold text-sky-700">LTC Smart Care</h1>
      </header>

      <main id="app-content" class="flex-1 pb-20 md:pb-8 min-w-0"></main>

      <!-- Bottom Navigation (มือถือเท่านั้น) -->
      <nav class="app-bottom-nav no-print md:hidden fixed bottom-0 inset-x-0 z-30 bg-white border-t border-slate-200 grid grid-cols-4">
        <a href="#/dashboard" data-route="/dashboard" class="flex flex-col items-center justify-center py-2 gap-0.5 text-xs text-slate-400">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><path d="M3 11.5L12 4l9 7.5"/><path d="M5.5 10v9a1 1 0 0 0 1 1H10v-5.5a1 1 0 0 1 1-1h2a1 1 0 0 1 1 1V20h3.5a1 1 0 0 0 1-1v-9"/></svg>
          <span>หน้าหลัก</span>
        </a>
        <a href="#/patients" data-route="/patients" class="flex flex-col items-center justify-center py-2 gap-0.5 text-xs text-slate-400">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="9" cy="8" r="3"/><path d="M3.5 20c0-3 2.5-5.5 5.5-5.5s5.5 2.5 5.5 5.5"/><circle cx="17" cy="7" r="2.3"/><path d="M14.8 14.8c.7-.3 1.4-.5 2.2-.5 2.7 0 5 2.1 5 4.8"/></svg>
          <span>ผู้ป่วย</span>
        </a>
        <a href="#/assessments" data-route="/assessments" class="flex flex-col items-center justify-center py-2 gap-0.5 text-xs text-slate-400">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><rect x="5" y="4.5" width="14" height="17" rx="2"/><path d="M9 4.5V3.8a1.3 1.3 0 0 1 1.3-1.3h3.4A1.3 1.3 0 0 1 15 3.8v.7"/><path d="M8.5 13l2.2 2.2L15.5 10.5"/></svg>
          <span>แบบประเมิน</span>
        </a>
        <a href="#/settings" data-route="/settings" class="flex flex-col items-center justify-center py-2 gap-0.5 text-xs text-slate-400">
          <svg class="w-5 h-5" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3.2"/><path d="M12 2.5v2.4M12 19.1v2.4M21.5 12h-2.4M4.9 12H2.5M18.4 5.6l-1.7 1.7M7.3 16.7l-1.7 1.7M18.4 18.4l-1.7-1.7M7.3 7.3 5.6 5.6"/></svg>
          <span>ตั้งค่า</span>
        </a>
      </nav>
    </div>
  </div>

  <script type="module" src="assets/js/router.js"></script>
  <script>
    if ('serviceWorker' in navigator) {
      window.addEventListener('load', () => {
        navigator.serviceWorker.register('service-worker.js').catch(() => {});
      });
    }
  </script>
</body>
</html>
